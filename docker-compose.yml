version: "3.9"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  dqa-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  uploads-data:

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dqa-backend
    restart: unless-stopped
    # Port 8000 is NOT published externally — nginx proxies /api/ internally.
    # Uncomment the line below only for debugging:
    # ports:
    #   - "8000:8000"
    volumes:
      - uploads-data:/app/data/uploads
    env_file:
      - ./backend/.env
    networks:
      - dqa-net

  # ── Frontend (nginx) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # /api is the nginx-proxied path — do NOT use http://localhost:8000
        VITE_API_URL: /api
    container_name: dqa-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - dqa-net
